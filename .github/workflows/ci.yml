name: CI
on:
  push:
  pull_request:
jobs:
  lint:
    name: Lint ansible playbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install ansible-lint
      - run: make lint

  validate-pacman-conf:
    name: Validate pacman.conf file
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          pacman-conf -c ./etc/pacman.conf > /dev/null

  test-vm:
    if: false
    name: Test playbooks using Packer and QEMU
    needs: [lint, validate-pacman-conf]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU/KVM
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils

      - uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      - name: Get Arch ISO sha256sum for cache key
        id: iso-hash
        run: echo "hash=$(curl -sL https://geo.mirror.pkgbuild.com/iso/latest/sha256sums.txt | sha256sum | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Cache Packer ISO
        uses: actions/cache@v4
        with:
          path: tests/packer_cache
          key: ${{ runner.os }}-packer-iso-${{ steps.iso-hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-packer-iso-

      - name: Test System Bootstrap Playbook
        run: make test-system

      - name: Test User Configuration Playbook
        run: make test-user
