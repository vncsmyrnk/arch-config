---
- name: Some arch configuration
  hosts: 127.0.0.1
  connection: local
  tasks:
    - name: Clone yay-bin from AUR
      tags: [core, yay]
      ansible.builtin.git:
        repo: "https://aur.archlinux.org/yay-bin.git"
        dest: "{{ ansible_facts['user_dir'] }}/yay"
      check_mode: false

    - name: Build and install yay
      tags: [core, yay]
      ansible.builtin.command:
        cmd: makepkg -si --noconfirm
        chdir: "{{ ansible_facts['user_dir'] }}/yay"
        creates: /usr/bin/yay
      check_mode: false

    - name: Ensure yay target directory exists
      tags: [always]
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/.config/yay"
        state: directory
        mode: "0755"
      changed_when: false
      check_mode: false

    - name: Stow yay configuration
      tags: [core, yay, dotfiles]
      ansible.builtin.command:
        cmd: stow -t "{{ ansible_facts['user_dir'] }}/.config/yay" yay
        creates: "{{ ansible_facts['user_dir'] }}}/.config/yay"
      changed_when: false

    - name: Install core tools
      become: true
      tags: [core]
      community.general.pacman:
        name:
          [
            base-devel,
            man-db,
            man-pages,
            git,
            net-tools,
            networkmanager,
            sudo,
            just,
            stow,
            lsof,
            fastfetch,
            tree,
            pass,
            tmux,
            lazygit,
            jq,
            fzf,
            ripgrep,
            tree-sitter,
            tree-sitter-cli,
            oath-toolkit,
            fd,
            sshfs,
            mkcert,
            rclone,
            neovim,
            lua51,
            rofi,
            htop,
            nvtop,
            envycontrol,
            nix,
            shell-utils-git,
            inetutils,
            openbsd-netcat,
            sops,
            udisks2,
            inotify-tools,
            dmidecode,
            miller,
            ghostty,
            timeshift,
          ]
        state: present
        update_cache: true

    - name: Install development tools
      become: true
      tags: [development]
      community.general.pacman:
        name:
          [
            docker,
            docker-compose,
            docker-buildx,
            mariadb-clients,
            go,
            golangci-lint,
            vault,
            github-cli,
            kubectl,
            nodejs,
            fluxcd,
            google-cloud-sdk,
            prettier,
            luarocks,
            htmlq,
            npm,
            yarn,
            namcap,
            moreutils,
            redis-cli,
            claude-code,
            python-pandas,
            python-matplotlib,
            python-seaborn,
          ]
        state: present
        update_cache: true

    - name: Install GPU tools
      become: true
      tags: [gpu]
      community.general.pacman:
        name: [nvidia-open]
        state: present
        update_cache: true

    - name: Install GNOME tools
      become: true
      tags: [gnome]
      community.general.pacman:
        name: [eog, gnome, gdm, wl-clipboard]
        state: present
        update_cache: true

    - name: Install AUR packages
      tags: [aur]
      kewlfft.aur.aur:
        use: yay
        name:
          [
            google-chrome,
            gnome-shell-extension-argos-git,
            gnome-shell-extension-window-calls-git,
            gwin-git,
            shell-utils-git,
            antigravity-cli,
            ngrok,
            stripe-cli,
            downgrade,
            python-plotext,
            github-copilot-cli,
          ]
        state: present

    - name: Get UUID of the backup target partition
      tags: [always]
      ansible.builtin.command:
        cmd: findmnt -n -o UUID -T /
      register: target_drive_uuid
      changed_when: false
      check_mode: false

    - name: Ensure /etc/timeshift directory exists
      become: true
      tags: [core, etc]
      ansible.builtin.file:
        path: /etc/timeshift
        state: directory
        mode: "0755"
      check_mode: false

    - name: Copy /etc/timeshift/timeshift.json
      become: true
      tags: [core, etc]
      ansible.builtin.template:
        src: ./etc/timeshift/timeshift.json.j2
        dest: /etc/timeshift/timeshift.json
        mode: "0644"
        backup: true

    - name: Copy /etc/pacman.conf
      become: true
      tags: [core, etc]
      ansible.builtin.copy:
        src: ./etc/pacman.conf
        dest: /etc/pacman.conf
        mode: "0644"
        backup: true

    - name: Clone dotfiles Git repository
      tags: [core, dotfiles]
      ansible.builtin.git:
        repo: "https://github.com/vncsmyrnk/dotfiles.git"
        dest: "{{ ansible_facts['user_dir'] }}/dotfiles"
        version: main
        update: yes
        recursive: yes
      changed_when: false
